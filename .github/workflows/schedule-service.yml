name: schedule-service

on:
  push:
    branches: [main]
    paths:
      - 'schedule-service/**'
      - '.github/workflows/schedule-service.yml'
  pull_request:
    paths:
      - 'schedule-service/**'
      - '.github/workflows/schedule-service.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nll-scheduler/schedule-service

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schedule-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: schedule-service/go.mod
          cache-dependency-path: schedule-service/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: schedule-service
          version: latest

      - name: Test
        run: go test ./... -race -count=1

  build-push:
    name: Build & Push
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: schedule-service
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image
        run: |
          kubectl set image deployment/schedule-service \
            schedule-service=${{ env.IMAGE }}:${{ github.sha }} \
            -n nll-scheduler-dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/schedule-service \
            -n nll-scheduler-dev --timeout=120s
