name: scheduler-engine

on:
  push:
    branches: [main]
    paths:
      - 'scheduler-engine/**'
      - '.github/workflows/scheduler-engine.yml'
  pull_request:
    paths:
      - 'scheduler-engine/**'
      - '.github/workflows/scheduler-engine.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nll-scheduler/scheduler-engine

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scheduler-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx

      - name: Lint
        run: ruff check app/

      - name: Test
        run: pytest tests/ -v

  build-push:
    name: Build & Push
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: scheduler-engine
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image
        run: |
          kubectl set image deployment/scheduler-engine \
            scheduler-engine=${{ env.IMAGE }}:${{ github.sha }} \
            -n nll-scheduler-dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/scheduler-engine \
            -n nll-scheduler-dev --timeout=300s
