name: scheduler-engine

on:
  push:
    branches: [main]
    paths:
      - 'scheduler-engine/**'
      - '.github/workflows/scheduler-engine.yml'
  pull_request:
    paths:
      - 'scheduler-engine/**'
      - '.github/workflows/scheduler-engine.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nll-scheduler/scheduler-engine

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scheduler-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx

      - name: Lint
        run: ruff check app/

      - name: Test
        run: pytest tests/ -v

  build-push:
    name: Build & Push
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: scheduler-engine
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    name: Update manifest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in kustomization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            cd k8s/prod
            kustomize edit set image ${{ env.IMAGE }}:${{ github.sha }}
            cd ../..
            git add k8s/prod/kustomization.yaml
            git diff --staged --quiet && break
            git commit -m "chore: update scheduler-engine image to ${{ github.sha }}"
            git push && break
            git reset HEAD~1
            sleep $((i * 2))
          done
