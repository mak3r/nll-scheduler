name: team-service

on:
  push:
    branches: [main]
    paths:
      - 'team-service/**'
      - '.github/workflows/team-service.yml'
  pull_request:
    paths:
      - 'team-service/**'
      - '.github/workflows/team-service.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nll-scheduler/team-service

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: team-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: team-service/go.mod
          cache-dependency-path: team-service/go.sum

      - name: Download dependencies
        run: go mod tidy

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: team-service
          version: latest

      - name: Test
        run: go test ./... -race -count=1

  build-push:
    name: Build & Push
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: team-service
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    name: Update manifest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in kustomization
        run: |
          cd k8s/prod
          kustomize edit set image ${{ env.IMAGE }}:${{ github.sha }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/prod/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore: update team-service image to ${{ github.sha }}"
          git push
