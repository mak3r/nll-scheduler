apiVersion: apps/v1
kind: Deployment
metadata:
  name: field-service
  namespace: nll-scheduler
  labels:
    app: field-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: field-service
  template:
    metadata:
      labels:
        app: field-service
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        lifecycle:
          preStop:
            exec:
              command: ["su-exec", "postgres", "pg_ctl", "stop", "-D", "/var/lib/postgresql/data", "-m", "fast"]
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: field-service-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: field-service-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: field-service-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "field_user", "-d", "field_db"]
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: field-service
        image: ghcr.io/mak3r/nll-scheduler/field-service:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: field-service-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: field-service-secret
              key: DATABASE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: field-service-postgres-pvc
